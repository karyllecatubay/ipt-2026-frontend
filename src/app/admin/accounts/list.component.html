<div class="card m-3">
    <h3 class="card-header">Accounts</h3>
    <div class="card-body">
        <a routerLink="add" class="btn btn-success mb-2">Create Account</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th style="width:30%">Name</th>
                    <th style="width:30%">Email</th>
                    <th style="width:30%">Role</th>
                    <th style="width:10%"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let account of accounts">
                    <td class="align-middle">{{account.title}} {{account.firstName}} {{account.lastName}}</td>
                    <td class="align-middle">{{account.email}}</td>
                    <td class="align-middle">{{account.role}}</td>
                    <td style="white-space: nowrap">
                        <a routerLink="edit/{{account.id}}" class="btn btn-primary me-1">Edit</a>
                        <button (click)="deleteAccount(account.id)" class="btn btn-danger" [disabled]="account.isDeleting">
                            <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm me-1"></span>
                            Delete
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
